<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品データベース - ポケドラ ランキング分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
    --rose-50:#fff1f4;--rose-100:#fde0e7;--rose-600:#d4386f;
    --rose-800:#8b1a42;--mauve-50:#fdf4f8;
    --text-main:#3a1628;--text-sub:#8b4f6a;--text-muted:#b8829a;
    --border:#f0c4d8;--border-light:#fae0ec;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--rose-50);color:var(--text-main);min-height:100vh}
.site-wrap{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
.header{display:flex;align-items:center;gap:14px;padding:16px 24px;background:#fff;border:0.5px solid var(--border);border-radius:16px;margin-bottom:20px}
.header-icon{width:38px;height:38px;border-radius:50%;background:var(--rose-100);display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:500;color:var(--rose-800);letter-spacing:.04em}
.header-sub{font-size:12px;font-weight:500;color:var(--rose-600);margin-top:3px;letter-spacing:.02em;border-left:2.5px solid var(--rose-600);padding-left:7px}
.nav-link{margin-left:auto;font-size:12px;color:var(--rose-600);background:var(--rose-50);border:0.5px solid var(--border);border-radius:20px;padding:6px 14px;text-decoration:none;white-space:nowrap}
.nav-link:hover{background:var(--rose-100)}
.controls{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-main);background:var(--rose-50);outline:none}
.search-wrap input:focus{border-color:var(--rose-600);background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
select{padding:7px 10px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-main);background:var(--rose-50);outline:none;cursor:pointer}
select:focus{border-color:var(--rose-600)}
.result-info{font-size:11px;color:var(--text-muted);white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;display:flex;gap:0;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 12px rgba(212,56,111,.1)}
.card-thumb{width:90px;min-width:90px;position:relative}
.card-thumb img{width:90px;height:68px;object-fit:cover;display:block}
.card-body{padding:8px 10px;flex:1;min-width:0}
.card-title{font-size:11px;font-weight:500;color:var(--rose-800);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.card-title a{color:inherit;text-decoration:none}
.card-title a:hover{color:var(--rose-600);text-decoration:underline}
.card-cv{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-meta{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.badge{display:inline-block;font-size:9px;border-radius:20px;padding:1px 6px;white-space:nowrap}
.badge-type{background:var(--rose-50);color:var(--text-muted);border:0.5px solid var(--border-light)}
.badge-new{background:#ecfdf5;color:#065f46;border:0.5px solid #6ee7b7}
.badge-discount{background:#fff7ed;color:#c2410c;border:0.5px solid #fed7aa}
.badge-date{font-size:9px;color:var(--rose-600)}
.price-info{font-size:10px;color:var(--rose-800);font-weight:500;margin-top:3px}
.price-sale{color:#be123c}
.price-orig{text-decoration:line-through;color:var(--text-muted);font-weight:400;margin-left:4px}
.loading{text-align:center;padding:60px;color:var(--text-muted);font-size:14px}
.empty{text-align:center;padding:40px;color:var(--text-muted);font-size:13px}
.pagination{display:flex;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap}
.page-btn{padding:6px 12px;border:0.5px solid var(--border);border-radius:20px;background:#fff;color:var(--rose-800);font-size:11px;cursor:pointer;transition:background .1s}
.page-btn:hover{background:var(--rose-100)}
.page-btn.active{background:var(--rose-600);color:#fff;border-color:var(--rose-600)}
.footer{text-align:center;margin-top:40px;font-size:11px;color:var(--text-muted);padding-top:20px;border-top:0.5px solid var(--border-light)}
@media(max-width:640px){
    .site-wrap{padding:10px 8px 40px}
    .header{padding:10px 12px;gap:8px;flex-wrap:wrap}
    .header-title{font-size:14px}
    .nav-link{font-size:10px;padding:4px 10px;margin-left:0;width:100%}
    .controls{gap:6px}
    .search-wrap{min-width:100%;order:-1}
    .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="site-wrap">

<div class="header">
    <div class="header-icon">🎧</div>
    <div>
        <div class="header-title">ポケドラ 作品データベース</div>
        <div class="header-sub">4,219件 収録</div>
    </div>
    <a href="index.html" class="nav-link">← ランキングへ</a>
</div>

<div class="controls">
    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="タイトル・声優・関連ワードで検索...">
    </div>
    <select id="typeFilter">
        <option value="">すべての種別</option>
    </select>
    <select id="sortSelect">
        <option value="id_desc">新しい順（商品ID）</option>
        <option value="id_asc">古い順（商品ID）</option>
        <option value="date_desc">発売日 新しい順</option>
        <option value="date_asc">発売日 古い順</option>
        <option value="discount">割引中のみ</option>
    </select>
    <span class="result-info" id="resultInfo">読み込み中...</span>
</div>

<div id="gridContainer" class="grid">
    <div class="loading">データを読み込んでいます...</div>
</div>
<div class="pagination" id="pagination"></div>

<div class="footer">
    ポケドラ ランキング分析 ／ データは2026年6月時点のスナップショットです<br>
    ※ 本サイトはポケットドラマCD（ポケドラ）のデータを使用しています
</div>

</div>
<script>
const PER_PAGE = 60;
let allItems = [];
let filtered = [];
let currentPage = 1;

async function loadData() {
    const res = await fetch('data/catalog.json');
    allItems = await res.json();
    // 種別フィルター選択肢を生成
    const types = [...new Set(allItems.map(d => d.type).filter(Boolean))].sort();
    const sel = document.getElementById('typeFilter');
    types.forEach(t => {
        const o = document.createElement('option');
        o.value = t; o.textContent = t;
        sel.appendChild(o);
    });
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const type = document.getElementById('typeFilter').value;
    const sort = document.getElementById('sortSelect').value;

    filtered = allItems.filter(d => {
        if (sort === 'discount' && d.is_discount !== 'True') return false;
        if (type && d.type !== type) return false;
        if (q) {
            const hay = (d.title + ' ' + d.cv + ' ' + d.tags + ' ' + d.series + ' ' + d.label).toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });

    // ソート
    filtered.sort((a, b) => {
        if (sort === 'id_asc')    return Number(a.id) - Number(b.id);
        if (sort === 'id_desc')   return Number(b.id) - Number(a.id);
        if (sort === 'date_desc') {
            if (!a.release_date && !b.release_date) return Number(b.id) - Number(a.id);
            if (!a.release_date) return 1;
            if (!b.release_date) return -1;
            return b.release_date.localeCompare(a.release_date);
        }
        if (sort === 'date_asc') {
            if (!a.release_date && !b.release_date) return Number(a.id) - Number(b.id);
            if (!a.release_date) return 1;
            if (!b.release_date) return -1;
            return a.release_date.localeCompare(b.release_date);
        }
        return Number(b.id) - Number(a.id);
    });

    currentPage = 1;
    render();
}

function render() {
    const total = filtered.length;
    const totalPages = Math.ceil(total / PER_PAGE);
    const start = (currentPage - 1) * PER_PAGE;
    const pageItems = filtered.slice(start, start + PER_PAGE);

    document.getElementById('resultInfo').textContent = `${total.toLocaleString()}件`;

    const grid = document.getElementById('gridContainer');
    if (pageItems.length === 0) {
        grid.innerHTML = '<div class="empty">条件に一致する作品がありません</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    grid.innerHTML = pageItems.map(d => cardHtml(d)).join('');

    // ページネーション
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    const pages = [];
    if (currentPage > 1) pages.push(`<button class="page-btn" onclick="goPage(${currentPage-1})">‹ 前へ</button>`);
    let lo = Math.max(1, currentPage - 2), hi = Math.min(totalPages, currentPage + 2);
    if (lo > 1) pages.push(`<button class="page-btn" onclick="goPage(1)">1</button>${lo > 2 ? '<span style="color:var(--text-muted);font-size:11px">…</span>' : ''}`);
    for (let i = lo; i <= hi; i++) pages.push(`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`);
    if (hi < totalPages) pages.push(`${hi < totalPages-1 ? '<span style="color:var(--text-muted);font-size:11px">…</span>' : ''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`);
    if (currentPage < totalPages) pages.push(`<button class="page-btn" onclick="goPage(${currentPage+1})">次へ ›</button>`);
    pag.innerHTML = pages.join('');
}

function goPage(n) {
    currentPage = n;
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function cardHtml(d) {
    const url = `https://pokedora.com/products/detail.php?product_id=${d.id}`;
    const thumb = `https://pokedora.com/get_image.php?product_id=${d.id}&thumb=medium`;
    const badges = [];
    if (d.type) badges.push(`<span class="badge badge-type">${esc(d.type)}</span>`);
    if (d.is_new === 'True') badges.push('<span class="badge badge-new">NEW</span>');
    if (d.is_discount === 'True') badges.push('<span class="badge badge-discount">割引中</span>');
    const dateStr = d.release_date ? `<span class="badge-date">📅 ${d.release_date}</span>` : '';
    let priceHtml = '';
    if (d.sale_price && d.regular_price && d.sale_price !== d.regular_price) {
        priceHtml = `<div class="price-info"><span class="price-sale">¥${Number(d.sale_price).toLocaleString()}</span><span class="price-orig">¥${Number(d.regular_price).toLocaleString()}</span></div>`;
    } else if (d.regular_price || d.sale_price) {
        const p = d.regular_price || d.sale_price;
        priceHtml = `<div class="price-info">¥${Number(p).toLocaleString()}</div>`;
    }
    return `<div class="card">
  <div class="card-thumb"><a href="${url}" target="_blank" rel="noopener"><img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'"></a></div>
  <div class="card-body">
    <div class="card-title"><a href="${url}" target="_blank" rel="noopener">${esc(d.title)}</a></div>
    ${d.cv ? `<div class="card-cv">🎙 ${esc(d.cv)}</div>` : ''}
    <div class="card-meta">${badges.join('')}${dateStr}</div>
    ${priceHtml}
  </div>
</div>`;
}

function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let debTimer;
document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debTimer);
    debTimer = setTimeout(applyFilters, 200);
});
document.getElementById('typeFilter').addEventListener('change', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);

loadData();
</script>
</body>
</html>
